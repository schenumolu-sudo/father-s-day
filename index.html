<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Father's Day</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#4e54c8,#8f94fb);
    min-height:100vh;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

.main-card{
    max-width:700px;
    margin:auto;
    margin-top:50px;
    padding:30px;
    background:white;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
    color:#4e54c8;
}

#message{
    display:none;
}

#typing{
    color:#ff4d6d;
    font-weight:bold;
    min-height:60px;
}

.heart{
    position:fixed;
    bottom:-50px;
    font-size:2rem;
    animation:float 8s linear infinite;
    opacity:.7;
    z-index:0;
}

.heart1{ left:10%; }
.heart2{ left:50%; animation-delay:2s; }
.heart3{ left:80%; animation-delay:4s; }

@keyframes float{
    from{ transform:translateY(0); }
    to{ transform:translateY(-110vh); }
}

.carousel img{
    height:350px;
    object-fit:cover;
    border-radius:15px;
}

</style>
</head>

<body>

<!-- Floating Hearts -->
<div class="heart heart1">❤️</div>
<div class="heart heart2">❤️</div>
<div class="heart heart3">❤️</div>

<div class="container">

<div class="main-card text-center">

<h1>Happy Father's Day</h1>

<!-- Dad Photo -->
<img src="blob:https://web.whatsapp.com/15b7e105-0740-4a4e-a734-4520302aa548"
     class="img-fluid rounded-circle shadow my-3"
     style="width:220px;height:220px;object-fit:cover;">

<p class="lead">
Thank you Dad for always supporting me,
helping me, and making every day better.
</p>

<button class="btn btn-primary btn-lg" onclick="showSurprise()">
🎁 Open Surprise
</button>

<div id="message">

<h3 id="typing" class="mt-4"></h3>

<div class="alert alert-success mt-3">
❤️ You're the best Dad in the world! ❤️
</div>

<!-- Family Carousel -->
<div id="familyCarousel" class="carousel slide mt-4" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="blob:https://web.whatsapp.com/41d1a00e-988e-4668-b06b-ece51c1adbeb" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="blob:https://web.whatsapp.com/ae227f2e-7484-493e-9ef3-2220d5889617" class="d-block w-100">
</div>

<div class="carousel-item">
<img src="blob:https://web.whatsapp.com/31a11fff-99e1-4c58-83c9-fd9e7e6885fd" class="d-block w-100">
</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#familyCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#familyCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<!-- 🎵 YouTube Music -->
<div id="music" style="display:none; margin-top:20px;">
    <iframe
        id="song"
        width="0"
        height="0"
        src="https://www.youtube.com/embed/HX9QEHv2HMc?autoplay=1"
        allow="autoplay">
    </iframe>
</div>

</div>

</div>
</div>

<script>

const text =
"Thank you Dad for everything you do for our family. I love you and appreciate all your hard work! ❤️";

let i = 0;

function typeWriter(){
    if(i < text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter,60);
    }
}

function showSurprise(){
    document.getElementById("message").style.display = "block";
    document.getElementById("music").style.display = "block";

    if(i === 0){
        typeWriter();
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
