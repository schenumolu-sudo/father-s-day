<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Father's Day</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#4e54c8,#8f94fb);
    min-height:100vh;
    overflow-x:hidden;
    font-family:Arial,sans-serif;
}

.main-card{
    max-width:700px;
    margin:auto;
    margin-top:50px;
    padding:30px;
    background:white;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

h1{
    color:#4e54c8;
}

#message{
    display:none;
}

#typing{
    color:#ff4d6d;
    font-weight:bold;
    min-height:60px;
}

.gift-box{
    font-size:90px;
    cursor:pointer;
    transition:transform .3s;
    margin-top:20px;
}

.gift-box:hover{
    transform:scale(1.1);
}

#surprise{
    display:none;
    font-size:50px;
    animation:pop .5s ease;
    margin-top:20px;
}

.heart{
    position:fixed;
    bottom:-50px;
    font-size:2rem;
    animation:float 8s linear infinite;
    opacity:.7;
    z-index:0;
}

.heart1{ left:10%; }
.heart2{ left:50%; animation-delay:2s; }
.heart3{ left:80%; animation-delay:4s; }

@keyframes float{
    from{ transform:translateY(0); }
    to{ transform:translateY(-110vh); }
}

@keyframes pop{
    from{
        transform:scale(0);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

</style>
</head>

<body>

<!-- Floating Hearts -->
<div class="heart heart1">❤️</div>
<div class="heart heart2">❤️</div>
<div class="heart heart3">❤️</div>

<div class="container">

<div class="main-card text-center">

<h1>👔 Happy Father's Day 👔</h1>

<p class="lead">
Thank you Dad for always supporting me,
helping me, and making every day better.
</p>

<!-- Present -->
<div class="gift-box" onclick="showSurprise()">
    🎁
</div>

<!-- Surprise -->
<div id="surprise">
    ❤️ BEST DAD EVER ❤️
</div>

<div id="message">

<h3 id="typing" class="mt-4"></h3>

<div class="alert alert-success mt-3">
❤️ You're the best Dad in the world! ❤️
</div>

</div>

</div>

</div>

<script>

const text =
"Thank you Dad for everything you do for our family. I love you and appreciate all your hard work! ❤️";

let i = 0;
let typingStarted = false;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 50);
    }
}

function showSurprise() {

    document.querySelector(".gift-box").innerHTML = "📦";

    document.getElementById("surprise").style.display = "block";
    document.getElementById("message").style.display = "block";

    if (!typingStarted) {
        typingStarted = true;
        typeWriter();
    }
}

</script>

</body>
</html>
